const TODAY = new Date("2026-04-13");
function parseDate(s) { return new Date(s + "T00:00:00"); }
function daysAgo(dateStr) { return Math.round((TODAY - parseDate(dateStr)) / 86400000); }
function fmtDate(dateStr) { return parseDate(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
function relTime(dateStr) {
  const n = daysAgo(dateStr);
  if (n === 0) return "today";
  if (n === 1) return "yesterday";
  if (n < 7) return `${n} days ago`;
  if (n < 30) return `${Math.floor(n / 7)} week${Math.floor(n / 7) > 1 ? "s" : ""} ago`;
  return `${Math.floor(n / 30)} month${Math.floor(n / 30) > 1 ? "s" : ""} ago`;
}

let activeFilter = "month";
function filterProblems(range) {
  const cutoff = { week: 7, month: 30, "3months": 90, "6months": 180, all: 9999 }[range];
  return PROBLEMS.filter(p => daysAgo(p.date) <= cutoff);
}

function route() {
  const hash = window.location.hash || "#/";
  const view = document.getElementById("view");
  view.classList.remove("fade-in"); void view.offsetWidth; view.classList.add("fade-in");
  if (hash.startsWith("#/problem/")) renderProblem(hash.replace("#/problem/", ""));
  else renderDashboard();
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);

function setFilter(f) { activeFilter = f; renderDashboard(); }

function renderDashboard() {
  const filtered = filterProblems(activeFilter);
  const solved = filtered.length;
  const submissions = filtered.reduce((s, p) => s + p.attempts, 0);
  const successRate = submissions ? ((solved / submissions) * 100).toFixed(1) : 0;
  const points = filtered.reduce((s, p) => s + p.score, 0);

  const subs = { "Introduction":7, "Basic Data Types":6, "Strings":13, "Sets":2 };
  const subsDone = {};
  filtered.forEach(p => subsDone[p.sub] = (subsDone[p.sub] || 0) + 1);
  const skillRows = Object.keys(subs).map(k => ({
    name: k, done: subsDone[k] || 0, total: subs[k],
    pct: Math.round(((subsDone[k] || 0) / subs[k]) * 100)
  }));

  const heat = [];
  const countByDate = {};
  PROBLEMS.forEach(p => countByDate[p.date] = (countByDate[p.date] || 0) + 1);
  for (let i = 89; i >= 0; i--) {
    const d = new Date(TODAY); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const c = countByDate[ds] || 0;
    heat.push({ date: ds, count: c, level: c === 0 ? 0 : c === 1 ? 2 : c === 2 ? 3 : 4 });
  }

  let streak = 0;
  for (let i = heat.length - 1; i >= 0; i--) {
    if (heat[i].count > 0) streak++;
    else if (daysAgo(heat[i].date) === 0) continue;
    else break;
  }

  const weeks = [];
  for (let w = 5; w >= 0; w--) {
    const end = new Date(TODAY); end.setDate(end.getDate() - w * 7);
    const start = new Date(end); start.setDate(start.getDate() - 6);
    const count = PROBLEMS.filter(p => {
      const pd = parseDate(p.date);
      return pd >= start && pd <= end;
    }).length;
    weeks.push({ label: `W${6 - w}`, count });
  }
  const maxW = Math.max(...weeks.map(w => w.count), 1);

  document.getElementById("view").innerHTML = `
    <div class="bg-[#1c1c1c] border border-neutral-800 rounded-lg p-6 mb-6">
      <div class="flex flex-col md:flex-row gap-6">
        <div class="flex items-start gap-4">
          <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#00ea64] to-green-800 flex items-center justify-center text-black font-black text-2xl border-2 border-[#00ea64]">CK</div>
          <div>
            <div class="flex items-center gap-2">
              <h1 class="text-xl font-bold text-white">${PROFILE.name}</h1>
              <span class="text-xs bg-[#00ea64]/10 text-[#00ea64] px-2 py-0.5 rounded font-medium">PYTHON</span>
            </div>
            <div class="text-sm text-[#00ea64] font-mono">@${PROFILE.handle}</div>
            <div class="text-xs text-neutral-400 mt-1">${PROFILE.degree}</div>
            <div class="text-xs text-neutral-500">${PROFILE.college}</div>
            <div class="text-xs text-neutral-500">${PROFILE.year} · USN ${PROFILE.usn}</div>
            <div class="text-xs text-neutral-600 mt-2">📍 ${PROFILE.country} · Joined ${PROFILE.joined}</div>
          </div>
        </div>
        <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-3 md:border-l md:border-neutral-800 md:pl-6">
          <div><div class="text-xs text-neutral-500 uppercase">Rank</div><div class="text-lg font-bold text-white font-mono">${PROFILE.rank.toLocaleString()}</div></div>
          <div><div class="text-xs text-neutral-500 uppercase">Points</div><div class="text-lg font-bold text-[#00ea64] font-mono">${PROFILE.points}</div></div>
          <div><div class="text-xs text-neutral-500 uppercase">Streak</div><div class="text-lg font-bold text-orange-400 font-mono">${streak}d</div></div>
          <div><div class="text-xs text-neutral-500 uppercase">Solved</div><div class="text-lg font-bold text-white font-mono">${PROBLEMS.length}</div></div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-neutral-800">
        ${PROFILE.badges.map(b => `<span class="text-xs bg-[#00ea64]/10 text-[#00ea64] border border-[#00ea64]/30 px-2.5 py-1 rounded-full">★ ${b}</span>`).join("")}
        <span class="text-xs bg-neutral-800 text-neutral-400 border border-neutral-700 px-2.5 py-1 rounded-full">🔥 ${streak}-day streak</span>
      </div>
    </div>

    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 class="text-white font-bold text-lg">Progress Overview</h2>
      <div class="flex items-center gap-1 bg-[#1c1c1c] border border-neutral-800 rounded-lg p-1 flex-wrap">
        ${[["week","Week"],["month","Month"],["3months","3 Months"],["6months","6 Months"],["all","All Time"]].map(([k,l]) => `
          <button onclick="setFilter('${k}')" class="px-3 py-1.5 text-xs rounded ${activeFilter === k ? 'bg-[#00ea64] text-black font-semibold' : 'text-neutral-400 hover:text-white'}">${l}</button>
        `).join("")}
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      ${[
        {label:"Problems Solved", val:solved, sub:`of ${PROBLEMS.length} total`, clr:"text-white"},
        {label:"Submissions", val:submissions, sub:`${(submissions/Math.max(solved,1)).toFixed(2)} avg/problem`, clr:"text-white"},
        {label:"Success Rate", val:successRate+"%", sub:"accepted", clr:"text-[#00ea64]"},
        {label:"Points Earned", val:points, sub:"XP", clr:"text-[#00ea64]"}
      ].map(s => `
        <div class="bg-[#1c1c1c] border border-neutral-800 rounded-lg p-4">
          <div class="text-xs text-neutral-500 uppercase tracking-wider mb-2">${s.label}</div>
          <div class="text-2xl font-bold ${s.clr} font-mono">${s.val}</div>
          <div class="text-xs text-neutral-600 mt-1">${s.sub}</div>
        </div>
      `).join("")}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="lg:col-span-2 bg-[#1c1c1c] border border-neutral-800 rounded-lg p-5">
        <h3 class="text-white font-semibold mb-5 flex items-center gap-2">
          <span class="w-1 h-4 bg-[#00ea64] rounded"></span> Python Subdomain Progress
        </h3>
        ${skillRows.map(s => `
          <div class="mb-4 last:mb-0">
            <div class="flex justify-between items-center mb-1.5">
              <span class="text-sm text-white">${s.name}</span>
              <span class="text-xs text-neutral-400 font-mono">${s.done} / ${s.total} · ${s.pct}%</span>
            </div>
            <div class="h-1.5 bg-neutral-800 rounded-full overflow-hidden">
              <div class="bar-fill h-full bg-gradient-to-r from-[#00ea64] to-green-500 rounded-full" style="width:0%" data-w="${s.pct}"></div>
            </div>
          </div>
        `).join("")}
      </div>

      <div class="bg-[#1c1c1c] border border-neutral-800 rounded-lg p-5">
        <h3 class="text-white font-semibold mb-5 flex items-center gap-2">
          <span class="w-1 h-4 bg-[#00ea64] rounded"></span> Last 6 Weeks
        </h3>
        <div class="flex items-end justify-between gap-2 h-36 mb-2">
          ${weeks.map(w => `
            <div class="flex flex-col items-center flex-1 gap-1 h-full justify-end">
              <div class="text-xs text-neutral-400 font-mono">${w.count}</div>
              <div class="w-full rounded-t ${w.count > 0 ? 'bg-[#00ea64]' : 'bg-neutral-800'}" style="height:${(w.count/maxW)*100}%;min-height:3px"></div>
              <div class="text-xs text-neutral-500 font-mono">${w.label}</div>
            </div>
          `).join("")}
        </div>
        <div class="text-xs text-neutral-500 mt-3 pt-3 border-t border-neutral-800">Avg ${(PROBLEMS.length / 6).toFixed(1)} problems / week</div>
      </div>
    </div>

    <div class="bg-[#1c1c1c] border border-neutral-800 rounded-lg p-5 mb-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h3 class="text-white font-semibold flex items-center gap-2">
          <span class="w-1 h-4 bg-[#00ea64] rounded"></span> Activity · Last 90 Days
        </h3>
        <div class="flex items-center gap-2 text-xs text-neutral-500">
          <span>Less</span>
          <span class="heat-cell heat-0"></span>
          <span class="heat-cell heat-1"></span>
          <span class="heat-cell heat-2"></span>
          <span class="heat-cell heat-3"></span>
          <span class="heat-cell heat-4"></span>
          <span>More</span>
        </div>
      </div>
      <div class="flex flex-wrap gap-1">
        ${heat.map(h => `<div class="heat-cell heat-${h.level}" title="${h.date}: ${h.count} submission${h.count !== 1 ? 's' : ''}"></div>`).join("")}
      </div>
      <div class="text-xs text-neutral-500 mt-3 pt-3 border-t border-neutral-800">${PROBLEMS.length} submissions in the last 90 days · Active in ${Object.keys(countByDate).length} distinct days</div>
    </div>

    <div class="bg-[#1c1c1c] border border-neutral-800 rounded-lg p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-white font-semibold flex items-center gap-2">
          <span class="w-1 h-4 bg-[#00ea64] rounded"></span> My Submissions
        </h3>
        <span class="text-xs text-neutral-500 font-mono">${filtered.length} result${filtered.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-xs text-neutral-500 uppercase tracking-wider border-b border-neutral-800">
              <th class="text-left py-2 pr-4 font-medium">Problem</th>
              <th class="text-left py-2 pr-4 font-medium hidden md:table-cell">Subdomain</th>
              <th class="text-left py-2 pr-4 font-medium">Difficulty</th>
              <th class="text-left py-2 pr-4 font-medium hidden md:table-cell">Score</th>
              <th class="text-left py-2 pr-4 font-medium">Status</th>
              <th class="text-left py-2 pr-2 font-medium">Submitted</th>
            </tr>
          </thead>
          <tbody>
            ${[...filtered].sort((a,b) => parseDate(b.date) - parseDate(a.date)).map(p => `
              <tr onclick="location.hash='#/problem/${p.slug}'" class="border-b border-neutral-800/50 hover:bg-neutral-800/40 cursor-pointer transition">
                <td class="py-3 pr-4"><span class="text-[#00ea64] hover:underline font-medium">${p.title}</span></td>
                <td class="py-3 pr-4 text-neutral-400 text-xs hidden md:table-cell">${p.sub}</td>
                <td class="py-3 pr-4"><span class="text-xs px-2 py-0.5 rounded font-medium ${p.diff === 'Easy' ? 'text-[#00ea64] bg-[#00ea64]/10' : 'text-yellow-400 bg-yellow-500/10'}">${p.diff}</span></td>
                <td class="py-3 pr-4 font-mono text-xs hidden md:table-cell"><span class="text-[#00ea64]">${p.score}</span><span class="text-neutral-600">/${p.max}</span></td>
                <td class="py-3 pr-4"><span class="text-xs text-[#00ea64] font-medium">● Accepted</span></td>
                <td class="py-3 pr-2 text-xs text-neutral-500 font-mono">${relTime(p.date)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
      ${filtered.length === 0 ? '<div class="text-center py-8 text-neutral-500 text-sm">No submissions in this time range.</div>' : ''}
    </div>
  `;

  setTimeout(() => {
    document.querySelectorAll(".bar-fill").forEach(b => b.style.width = b.dataset.w + "%");
  }, 100);
}

function renderProblem(slug) {
  const p = PROBLEMS.find(x => x.slug === slug);
  if (!p) { document.getElementById("view").innerHTML = '<div class="text-center py-20 text-neutral-500">Problem not found. <a href="#/" class="text-[#00ea64]">← Back</a></div>'; return; }

  const idx = PROBLEMS.findIndex(x => x.slug === slug);
  const prev = PROBLEMS[idx - 1];
  const next = PROBLEMS[idx + 1];
  const escCode = p.code.replace(/&/g,"&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const descHtml = p.desc.split("\n").map(l => `<p class="mb-2">${l || "&nbsp;"}</p>`).join("");
  const runtime = (Math.random() * 0.08 + 0.02).toFixed(3);
  const memory = (Math.random() * 3 + 9).toFixed(1);

  document.getElementById("view").innerHTML = `
    <a href="#/" class="inline-flex items-center gap-1 text-sm text-neutral-400 hover:text-[#00ea64] mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back to Dashboard
    </a>

    <div class="flex flex-col lg:flex-row gap-6">
      <div class="lg:w-5/12 bg-[#1c1c1c] border border-neutral-800 rounded-lg p-6">
        <div class="flex items-center gap-2 mb-2 flex-wrap">
          <span class="text-xs text-neutral-500">${p.sub}</span>
          <span class="text-neutral-700">·</span>
          <span class="text-xs px-2 py-0.5 rounded font-medium ${p.diff === 'Easy' ? 'text-[#00ea64] bg-[#00ea64]/10' : 'text-yellow-400 bg-yellow-500/10'}">${p.diff}</span>
          <span class="text-neutral-700">·</span>
          <span class="text-xs text-neutral-500 font-mono">Max Score: ${p.max}</span>
        </div>
        <h1 class="text-2xl font-bold text-white mb-4">${p.title}</h1>

        <div class="flex items-center gap-3 mb-6 pb-6 border-b border-neutral-800 flex-wrap">
          <div class="flex items-center gap-1.5 text-xs text-[#00ea64]">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            Accepted
          </div>
          <span class="text-xs text-neutral-600">·</span>
          <span class="text-xs text-neutral-400 font-mono">Score: ${p.score}/${p.max}</span>
          <span class="text-xs text-neutral-600">·</span>
          <span class="text-xs text-neutral-400 font-mono">${p.attempts} attempt${p.attempts > 1 ? 's' : ''}</span>
        </div>

        <div class="text-sm text-neutral-300 leading-relaxed">
          <h3 class="text-white font-semibold mb-2">Problem</h3>
          ${descHtml}
        </div>

        <div class="mt-6 pt-6 border-t border-neutral-800 grid grid-cols-2 gap-3 text-xs">
          <div><div class="text-neutral-500 mb-1">Submitted</div><div class="text-neutral-300 font-mono">${fmtDate(p.date)} · ${p.time}</div></div>
          <div><div class="text-neutral-500 mb-1">Language</div><div class="text-neutral-300 font-mono">Python 3</div></div>
          <div><div class="text-neutral-500 mb-1">Runtime</div><div class="text-neutral-300 font-mono">${runtime}s</div></div>
          <div><div class="text-neutral-500 mb-1">Memory</div><div class="text-neutral-300 font-mono">${memory} MB</div></div>
        </div>
      </div>

      <div class="lg:w-7/12 bg-[#1c1c1c] border border-neutral-800 rounded-lg overflow-hidden">
        <div class="flex items-center justify-between bg-[#0d1117] border-b border-neutral-800 px-4 py-2.5">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded bg-[#3776ab] flex items-center justify-center text-white text-xs font-bold">Py</div>
            <span class="text-sm text-neutral-300 font-mono">solution.py</span>
          </div>
          <div class="flex items-center gap-3 text-xs text-neutral-500">
            <span class="flex items-center gap-1 text-[#00ea64]">● Accepted</span>
            <span>${p.code.split("\n").length} lines</span>
          </div>
        </div>
        <pre><code class="language-python">${escCode}</code></pre>

        <div class="border-t border-neutral-800 p-4 bg-[#0d1117]">
          <div class="text-xs text-neutral-500 mb-2 uppercase tracking-wider">Test Cases</div>
          <div class="space-y-1.5">
            ${[1,2,3,4].map(i => `
              <div class="flex items-center justify-between text-xs">
                <span class="text-neutral-400 font-mono">Test Case #${i}</span>
                <span class="flex items-center gap-1.5 text-[#00ea64]">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                  Passed · ${(Math.random() * 0.03 + 0.001).toFixed(3)}s
                </span>
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-between mt-6 gap-3">
      ${prev ? `<a href="#/problem/${prev.slug}" class="flex-1 bg-[#1c1c1c] border border-neutral-800 rounded-lg p-4 hover:border-[#00ea64]/40 transition">
        <div class="text-xs text-neutral-500">← Previous</div>
        <div class="text-sm text-white font-medium mt-0.5 truncate">${prev.title}</div>
      </a>` : `<div class="flex-1"></div>`}
      ${next ? `<a href="#/problem/${next.slug}" class="flex-1 bg-[#1c1c1c] border border-neutral-800 rounded-lg p-4 hover:border-[#00ea64]/40 transition text-right">
        <div class="text-xs text-neutral-500">Next →</div>
        <div class="text-sm text-white font-medium mt-0.5 truncate">${next.title}</div>
      </a>` : `<div class="flex-1"></div>`}
    </div>
  `;

  Prism.highlightAll();
}

route();
</script>
</body>
</html>
